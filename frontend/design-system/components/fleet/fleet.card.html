<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  body { padding: 24px; background: var(--tg-bg-deep); }
  .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .feed { display: flex; flex-direction: column; gap: 10px; }

</style>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { DroneCard, AlertRow } = window.DesignSystem_91a397;
    function Demo() {
      return (
        <div className="grid" data-threat="elevated">
          <div>
            <div className="gl tg-label">Fleet</div>
            <div className="cards">
              <DroneCard drone={{ id: 'WT-01', status: 'PATROLLING', battery_pct: 87, position: { lat: 40.63167, lng: -74.20806 } }} />

            </div>
          </div>
          <div>
            <div className="gl tg-label">Live Alerts</div>
            <div className="feed">
              <AlertRow alert={{ type: 'MOTION_DETECTED', severity: 'HIGH', message: 'Movement detected near East Gate', time: '03:17:42Z', source_drone: 'WT-01' }} />
