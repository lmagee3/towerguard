<!-- @dsCard group="Type" viewport="700x250" name="JetBrains Mono — Live Data" subtitle="ALL telemetry, IDs, coordinates, timestamps. Tabular figures" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; background: var(--tg-bg-surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 28px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--tg-border); padding: 7px 0; }
  .k { font-size: 11px; color: var(--tg-text-secondary); font-family: var(--tg-font-sans); letter-spacing: 0.04em; text-transform: uppercase; }
  .v { font-family: var(--tg-font-mono); font-size: 14px; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="row"><span class="k">Drone ID</span><span class="v" style="color: var(--tg-text-primary)">WT-01</span></div>
    <div class="row"><span class="k">Battery</span><span class="v" style="color: var(--tg-clear)">87%</span></div>
    <div class="row"><span class="k">GPS Lat</span><span class="v" style="color: var(--tg-text-primary)">40.63167</span></div>
    <div class="row"><span class="k">GPS Lng</span><span class="v" style="color: var(--tg-text-primary)">-74.20806</span></div>
    <div class="row"><span class="k">Altitude</span><span class="v" style="color: var(--tg-text-primary)">145ft AGL</span></div>
    <div class="row"><span class="k">Heading</span><span class="v" style="color: var(--tg-text-primary)">215° SW</span></div>
    <div class="row"><span class="k">Timestamp</span><span class="v" style="color: var(--tg-text-secondary)">03:17:42Z</span></div>
    <div class="row"><span class="k">Temp</span><span class="v" style="color: var(--tg-text-primary)">11°C</span></div>
  </div>
</body>
</html>
