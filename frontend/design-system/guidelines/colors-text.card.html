<!-- @dsCard group="Colors" viewport="700x150" name="Text & Borders" subtitle="Primary / secondary / muted ink + hairline borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; background: var(--tg-bg-surface); }
  .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; align-items: center; }
  .stack > div { display: flex; align-items: baseline; gap: 12px; padding: 5px 0; }
  .lbl { font-size: 18px; font-weight: 600; }
  .hex { font-family: var(--tg-font-mono); font-size: 11px; color: var(--tg-text-secondary); }
  .borders > div { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bbar { flex: 1; height: 0; border-top-style: solid; }
  .bn { font-family: var(--tg-font-mono); font-size: 11px; color: var(--tg-text-secondary); width: 64px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stack">
      <div><span class="lbl" style="color: var(--tg-text-primary)">Primary text</span><span class="hex">#E8E8F0</span></div>
      <div><span class="lbl" style="color: var(--tg-text-secondary)">Secondary text</span><span class="hex">#6B6B8A</span></div>
      <div><span class="lbl" style="color: var(--tg-text-muted)">Muted / disabled</span><span class="hex">#3A3A55</span></div>
    </div>
    <div class="borders">
      <div><span class="bn">border</span><span class="bbar" style="border-top: 1px solid var(--tg-border)"></span></div>
      <div><span class="bn">strong</span><span class="bbar" style="border-top: 1px solid var(--tg-border-strong)"></span></div>
    </div>
  </div>
</body>
</html>
