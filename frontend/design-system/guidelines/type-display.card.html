<!-- @dsCard group="Type" viewport="700x230" name="Inter — Display & Headings" subtitle="Narrative + UI. Tightened tracking at large sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; background: var(--tg-bg-surface); font-family: var(--tg-font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--tg-border); }
  .row:last-child { border-bottom: none; }
  .spec { font-family: var(--tg-font-mono); font-size: 10px; color: var(--tg-text-muted); white-space: nowrap; width: 120px; flex: none; }
  .t { color: var(--tg-text-primary); }
</style>
</head>
<body>
  <div class="row"><span class="t" style="font-size: 40px; font-weight: 700; letter-spacing: -0.02em">Perimeter Secured</span><span class="spec">Display · 40 · 700</span></div>
  <div class="row"><span class="t" style="font-size: 28px; font-weight: 700; letter-spacing: -0.01em">Fleet Status</span><span class="spec">H1 · 28 · 700</span></div>
  <div class="row"><span class="t" style="font-size: 20px; font-weight: 600">Live Alerts</span><span class="spec">H2 · 20 · 600</span></div>
  <div class="row"><span class="t" style="font-size: 16px; font-weight: 600">Mission Detail</span><span class="spec">H3 · 16 · 600</span></div>
</body>
</html>
