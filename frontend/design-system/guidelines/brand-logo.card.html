<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; background: var(--tg-bg-deep); }
  .wrap { display: grid; grid-template-columns: 220px 1fr; height: 260px; }
  .cell { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .left { border-right: 1px solid var(--tg-border); }
  img.mark { width: 120px; height: 120px; }
  img.horiz { width: 420px; max-width: 100%; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell left"><img class="mark" src="../assets/logos/towerguard-mark.png" alt="TowerGuard mark"></div>
    <div class="cell"><img class="horiz" src="../assets/logos/towerguard-horizontal.png" alt="TowerGuard horizontal lockup"></div>
  </div>
</body>
</html>
